<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="color-scheme" content="dark light"/>
<title>CoLAB OS v11</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>

/* ═══════════════════════════════════════════
   1. ROOT VARIABLES — DARK MODE DEFAULT
═══════════════════════════════════════════ */
:root {
  --bg:          #05040f;
  --bg-2:        #09081a;
  --bg-3:        #0d0c22;
  --panel:       rgba(255,255,255,.035);
  --panel-2:     rgba(255,255,255,.060);
  --border:      rgba(255,255,255,.080);
  --border-hi:   rgba(255,255,255,.140);
  --text:        #ffffff;
  --text-sub:    rgba(255,255,255,.55);
  --text-dim:    rgba(255,255,255,.28);
  --accent:      #f97316;
  --accent-d:    rgba(249,115,22,.10);
  --accent-g:    rgba(249,115,22,.32);
  --accent-b:    rgba(249,115,22,.06);
  --green:       #4ade80;
  --green-d:     rgba(74,222,128,.09);
  --red:         #f87171;
  --red-d:       rgba(248,113,113,.09);
  --purple:      #a78bfa;
  --purple-d:    rgba(167,139,250,.10);
  --blue:        #60a5fa;
  --shadow:      0 8px 32px rgba(0,0,0,.40);
  --shadow-lg:   0 20px 60px rgba(0,0,0,.50);
  --radius:      12px;
  --radius-sm:   8px;
  --font-sans:   'Syne', sans-serif;
  --font-mono:   'DM Mono', monospace;
  --sidebar-w:   56px;
  --topbar-h:    52px;
  --mc-h:        32px;
  --status-h:    28px;
}

/* ═══════════════════════════════════════════
   2. LIGHT MODE OVERRIDES
═══════════════════════════════════════════ */
body.light-mode {
  --bg:          #f2f1f8;
  --bg-2:        #e8e6f3;
  --bg-3:        #dddaf0;
  --panel:       rgba(255,255,255,.78);
  --panel-2:     rgba(255,255,255,.95);
  --border:      rgba(0,0,0,.07);
  --border-hi:   rgba(0,0,0,.13);
  --text:        #1a1828;
  --text-sub:    rgba(26,24,40,.60);
  --text-dim:    rgba(26,24,40,.35);
  --accent-d:    rgba(249,115,22,.08);
  --accent-g:    rgba(249,115,22,.25);
  --accent-b:    rgba(249,115,22,.05);
  --green-d:     rgba(34,197,94,.08);
  --red-d:       rgba(239,68,68,.07);
  --purple-d:    rgba(139,92,246,.08);
  --shadow:      0 4px 16px rgba(0,0,0,.07);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.10);
}
body.light-mode #os-bg        { background: linear-gradient(135deg,#ece9f9,#f4f2fc,#e8e5f5); }
body.light-mode #topbar        { background: rgba(255,255,255,.90); border-bottom-color: rgba(0,0,0,.07); }
body.light-mode #sidebar       { background: rgba(255,255,255,.92); border-right-color: rgba(0,0,0,.07); }
body.light-mode #flyout        { background: rgba(252,251,255,.97); border-right-color: rgba(0,0,0,.09); }
body.light-mode #mc-strip      { background: rgba(255,255,255,.70); border-bottom-color: rgba(0,0,0,.06); }
body.light-mode #statusbar     { background: rgba(255,255,255,.80); border-top-color:    rgba(0,0,0,.06); }
body.light-mode .glass         { background: rgba(255,255,255,.75); border-color: rgba(0,0,0,.07); }
body.light-mode .glass-sm      { background: rgba(255,255,255,.60); border-color: rgba(0,0,0,.06); }
body.light-mode .inp           { background: rgba(0,0,0,.04); border-color: rgba(0,0,0,.10); color: var(--text); }
body.light-mode .btn-ghost     { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.10); color: var(--text-sub); }
body.light-mode .btn-ghost:hover { background: rgba(0,0,0,.08); color: var(--text); }
body.light-mode .sub-btn       { color: var(--text-sub); }
body.light-mode .sub-btn:hover { background: rgba(0,0,0,.05); }
body.light-mode .mob-nav       { background: rgba(255,255,255,.96); border-top-color:    rgba(0,0,0,.07); }
body.light-mode .mob-drawer    { background: rgba(252,251,255,.97); }
body.light-mode .tbl td        { border-bottom-color: rgba(0,0,0,.04); }
body.light-mode .tbl tbody tr:hover td { background: rgba(0,0,0,.025); }
body.light-mode .k-col-head    { background: rgba(0,0,0,.03); border-color: rgba(0,0,0,.07); }
body.light-mode .k-col-body    { background: rgba(0,0,0,.02); border-color: rgba(0,0,0,.06); }
body.light-mode .k-card        { background: rgba(255,255,255,.80); border-color: rgba(0,0,0,.08); }
body.light-mode .cfg-block     { background: rgba(0,0,0,.04); }
body.light-mode .cmd-box       { background: rgba(250,249,255,.99); border-color: rgba(0,0,0,.12); }
body.light-mode #cmd-input     { color: var(--text); }

/* ═══════════════════════════════════════════
   3. LAYOUT — HEADER / SIDEBAR / VIEW
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
button { font-family: var(--font-sans); cursor: pointer; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#os-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 10% 15%, rgba(139,92,246,.18) 0%, transparent 70%),
    radial-gradient(ellipse 55% 45% at 90% 85%, rgba(249,115,22,.10) 0%, transparent 65%),
    radial-gradient(ellipse 40% 35% at 55% 50%, rgba(76,29,149,.12) 0%, transparent 70%),
    var(--bg);
}

/* TOPBAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); z-index: 200;
  background: rgba(255,255,255,.03); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 0 calc(var(--sidebar-w) + 16px);
  transition: background .25s, border-color .25s;
}
.topbar-left  { display: flex; flex-direction: column; }
.topbar-right { display: flex; align-items: center; gap: 8px; position: relative; }
#page-title   { font-size: 14px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
#breadcrumb   { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 1px; }
.bc-active    { color: var(--text-sub); }

/* LAYOUT */
#layout {
  position: fixed;
  top: var(--topbar-h); bottom: var(--status-h); left: 0; right: 0;
  display: flex; z-index: 1;
}

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: rgba(255,255,255,.04); border-right: 1px solid var(--border);
  backdrop-filter: blur(24px); display: flex; flex-direction: column;
  height: 100%; z-index: 100; transition: background .25s, border-color .25s;
}
#sidebar-brand {
  height: 56px; display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border); cursor: pointer; flex-shrink: 0;
}
.brand-mark {
  width: 30px; height: 30px; border-radius: 9px;
  background: linear-gradient(135deg,#ff8c3a,#f97316,#ea580c);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--accent-g);
}
.brand-mark span { color: #fff; font-size: 13px; font-weight: 800; letter-spacing: -1px; }
#sidebar-ws-toggle { display: flex; gap: 3px; padding: 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ws-btn {
  flex: 1; height: 22px; border: 1px solid transparent; border-radius: 5px;
  cursor: pointer; font-size: 8.5px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; font-family: var(--font-mono);
  transition: all .15s; background: transparent; color: var(--text-dim);
}
#sidebar-cats { flex: 1; overflow-y: auto; padding: 6px 0; }
#sidebar-foot {
  border-top: 1px solid var(--border); padding: 8px 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0;
}
.cat-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; width: var(--sidebar-w); height: 52px; border: none;
  background: transparent; cursor: pointer; color: var(--text-dim);
  transition: all .18s; position: relative; flex-shrink: 0;
}
.cat-btn:hover          { color: var(--text-sub); background: var(--panel); }
.cat-btn.active         { color: var(--accent); background: var(--accent-d); }
.cat-btn.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 30px; border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg,#ffb347,#f97316,#c2410c); box-shadow: 0 0 10px var(--accent);
}
.cat-btn .cat-lbl         { font-size: 7px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.cat-btn.active .cat-lbl  { color: var(--accent); }
.cat-btn.locked           { color: var(--border); cursor: default; }
.cat-btn.admin-cat.active { color: #818cf8 !important; background: rgba(99,102,241,.08) !important; }
.cat-btn.admin-cat.active::before { background: linear-gradient(180deg,#a5b4fc,#818cf8,#6366f1) !important; box-shadow: 0 0 12px #818cf8 !important; }

.sidebar-icon-btn {
  width: 30px; height: 28px; border-radius: 7px; background: var(--panel);
  border: 1px solid var(--border); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all .18s; font-size: 13px;
}
.sidebar-icon-btn:hover { background: var(--panel-2); border-color: var(--border-hi); }

/* FLYOUT */
#flyout {
  position: fixed; left: var(--sidebar-w); top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h) - var(--status-h)); width: 210px;
  background: rgba(4,3,14,.97); border-right: 1px solid var(--border-hi);
  backdrop-filter: blur(44px) saturate(180%); display: flex; flex-direction: column;
  z-index: 99; opacity: 0; pointer-events: none; transform: translateX(-8px);
  transition: opacity .18s ease, transform .18s ease; box-shadow: 6px 0 48px rgba(0,0,0,.6);
}
#flyout::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,transparent 10%,rgba(249,115,22,.3) 50%,transparent 90%);
}
#flyout.open           { opacity: 1; pointer-events: all; transform: none; }
#flyout-head           { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#flyout-cat-label      {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  background: linear-gradient(90deg,#f97316,#a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  font-family: var(--font-mono);
}
#flyout-cat-label.admin-flyout {
  background: linear-gradient(90deg,#818cf8,#a78bfa) !important;
  -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important;
}
#flyout-cat-desc       { font-size: 10px; color: var(--text-dim); margin-top: 3px; font-family: var(--font-mono); }
#flyout-nav            { flex: 1; overflow-y: auto; padding: 8px 6px; }
#flyout-foot           { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.tier-pill             { display: flex; align-items: center; gap: 7px; padding: 7px 11px; border-radius: 8px; background: var(--accent-d); border: 1px solid rgba(249,115,22,.18); }
.tier-pill span        { font-size: 10px; color: var(--accent); font-family: var(--font-mono); font-weight: 600; }
.sub-btn {
  display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px;
  font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent;
  width: 100%; text-align: left; color: var(--text-sub); transition: all .14s;
}
.sub-btn:hover            { color: var(--text); background: var(--panel-2); }
.sub-btn.active           { color: #fff; background: var(--accent-d); border: 1px solid rgba(249,115,22,.2); }
.sub-btn.active .sub-icon { color: var(--accent); }
.sub-btn.locked           { color: var(--text-dim); cursor: default; }
.sub-btn.locked:hover     { background: transparent; }
.sub-btn.admin-item.active { color: #fff !important; background: rgba(99,102,241,.10) !important; border-color: rgba(99,102,241,.25) !important; }
.sub-btn.admin-item.active .sub-icon { color: #818cf8 !important; }
.sub-icon  { font-size: 14px; flex-shrink: 0; }
.sub-label { flex: 1; }
.tier-tag  { margin-left: auto; font-size: 8px; color: var(--text-dim); background: var(--panel); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); }

/* MISSION CONTROL */
#mc-strip {
  position: absolute; top: 0; left: var(--sidebar-w); right: 0; height: var(--mc-h); z-index: 99;
  background: rgba(0,0,0,.25); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; overflow: hidden;
  transition: background .25s;
}
#mc-strip::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: linear-gradient(180deg,#4ade80,#22c55e);
}
.mc-item { display: flex; align-items: center; gap: 5px; padding: 0 10px; border-right: 1px solid var(--border); height: 100%; }
.mc-item:last-of-type { border-right: none; }
.mc-label  { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
.mc-value  { font-size: 10px; font-weight: 600; font-family: var(--font-mono); }
.mc-spacer { flex: 1; }
.mc-cmd-hint {
  display: flex; align-items: center; gap: 5px; padding: 3px 8px;
  border-radius: 5px; background: var(--panel); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s;
}
.mc-cmd-hint:hover { background: var(--accent-d); border-color: rgba(249,115,22,.18); }
.mc-cmd-hint span, .mc-cmd-hint kbd { font-size: 9.5px; color: var(--text-dim); font-family: var(--font-mono); }
.mc-cmd-hint kbd { padding: 1px 4px; border-radius: 3px; background: var(--panel-2); border: 1px solid var(--border-hi); }

/* MAIN VIEW */
#view { flex: 1; overflow-y: auto; min-width: 0; padding-top: var(--mc-h); }
#view::-webkit-scrollbar { width: 2px; }
#view-inner { padding: 14px; }

/* STATUSBAR */
#statusbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--status-h); z-index: 200;
  background: rgba(0,0,0,.30); backdrop-filter: blur(12px); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px 0 calc(var(--sidebar-w) + 16px); gap: 12px;
}
.status-item  { display: flex; align-items: center; gap: 5px; font-size: 9.5px; color: var(--text-dim); font-family: var(--font-mono); }
.status-sep   { width: 1px; height: 12px; background: var(--border); }

/* WS mode driven by CSS */
body:not(.focus-mode) #ws-btn-cmd  { background: var(--accent-d) !important; color: var(--accent) !important; border-color: rgba(249,115,22,.25) !important; }
body.focus-mode       #ws-btn-fx   { background: rgba(167,139,250,.14) !important; color: var(--purple) !important; border-color: rgba(167,139,250,.25) !important; }
body.focus-mode [data-cat="sales"],
body.focus-mode [data-cat="workflows"],
body.focus-mode [data-cat="reports"],
body.focus-mode [data-cat="apps"]   { display: none !important; }
body:not(.focus-mode) #ws-mode-chip { background: var(--accent-b) !important; border-color: rgba(249,115,22,.15) !important; }
body:not(.focus-mode) #ws-mode-chip span { color: var(--accent) !important; }
body.focus-mode       #ws-mode-chip { background: rgba(167,139,250,.08) !important; border-color: rgba(167,139,250,.18) !important; }
body.focus-mode       #ws-mode-chip span { color: var(--purple) !important; }
#ws-mode-chip { border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 6px; transition: all .15s; user-select: none; }
#ws-mode-chip span { font-size: 8.5px; font-weight: 700; letter-spacing: .5px; font-family: var(--font-mono); }

/* Topbar widgets */
.online-badge { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.14); font-size: 10px; color: var(--green); font-family: var(--font-mono); font-weight: 600; }
.user-chip    { display: flex; align-items: center; gap: 7px; padding: 4px 10px 4px 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 99px; cursor: pointer; }
.chip-dot     { width: 20px; height: 20px; border-radius: 6px; background: linear-gradient(135deg,rgba(249,115,22,.3),rgba(139,92,246,.3)); border: 1px solid rgba(249,115,22,.25); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); }
.user-label   { font-size: 11.5px; font-weight: 500; color: var(--text-sub); }
.curr-btn     { display: flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 6px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; font-family: var(--font-mono); font-size: 9px; color: var(--text-sub); transition: all .15s; }
.curr-btn:hover { border-color: var(--border-hi); color: var(--text); }
.curr-option  { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); transition: background .12s; }
.curr-option:hover, .curr-option.active { background: var(--accent-d); color: var(--text); }

/* Mobile nav */
.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(4,3,14,.96); border-top: 1px solid var(--border); backdrop-filter: blur(24px); z-index: 300; padding: 0 0 env(safe-area-inset-bottom) 0; flex-direction: column; }
.mob-nav-inner { display: flex; align-items: stretch; height: 58px; }
.mob-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,.3); transition: all .18s; position: relative; }
.mob-btn.active { color: var(--accent); }
.mob-btn.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 2px; border-radius: 0 0 3px 3px; background: var(--accent); box-shadow: 0 0 8px var(--accent-g); }
.mob-btn .mob-lbl { font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
.mob-drawer { display: none; position: fixed; bottom: 58px; left: 0; right: 0; background: rgba(4,3,14,.97); border-top: 1px solid var(--border); backdrop-filter: blur(32px); z-index: 199; padding: 10px 12px 6px; max-height: 65vh; overflow-y: auto; }
.mob-drawer.open { display: block; }
.mob-drawer-cat  { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--accent); font-family: var(--font-mono); margin-bottom: 8px; }
.mob-sub-grid    { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 8px; }
.mob-sub-item    { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 8px; border-radius: 10px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; transition: all .15s; text-align: center; }
.mob-sub-item:active, .mob-sub-item.active { background: var(--accent-d); border-color: rgba(249,115,22,.22); }
.mob-sub-item .mob-ic  { font-size: 18px; }
.mob-sub-item .mob-lbl { font-size: 10px; font-weight: 600; color: var(--text-sub); }
.mob-sub-item.active .mob-lbl { color: var(--accent); }
#drawer-bg { display: none; position: fixed; inset: 0; z-index: 198; background: rgba(0,0,0,.5); }
#drawer-bg.open { display: block; }

/* ═══════════════════════════════════════════
   4. COMPONENTS — CARDS / TABLES / BUTTONS
═══════════════════════════════════════════ */
.glass    { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); backdrop-filter: blur(16px); position: relative; overflow: hidden; transition: background .25s, border-color .25s; }
.glass::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%); }
.glass-sm { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: background .25s, border-color .25s; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 15px;
  border-radius: 9px; border: none; cursor: pointer;
  background: linear-gradient(135deg,#f97316,#ea580c); color: #fff;
  font-size: 12px; font-weight: 600; font-family: var(--font-sans);
  box-shadow: 0 0 16px rgba(249,115,22,.25); transition: all .15s; white-space: nowrap;
}
.btn-primary:hover  { box-shadow: 0 0 28px rgba(249,115,22,.4); transform: translateY(-1px); }
.btn-primary:active { transform: scale(.97); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px;
  border-radius: 9px; border: 1px solid var(--border-hi); cursor: pointer;
  background: var(--panel); color: var(--text-sub);
  font-size: 12px; font-weight: 500; font-family: var(--font-sans);
  transition: all .15s; white-space: nowrap;
}
.btn-ghost:hover { background: var(--panel-2); color: var(--text); }

.pill { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; letter-spacing: .3px; }
.tag  { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .3px; }

.inp { width: 100%; padding: 8px 12px; border-radius: var(--radius-sm); background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color .15s; -webkit-appearance: none; }
.inp:focus { border-color: rgba(249,115,22,.4); }
.inp::placeholder { color: var(--text-dim); }
select.inp option { background: var(--bg-2); color: var(--text); }

.label-xs { font-size: 9.5px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 4px; display: block; }

.section-head  { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.section-title { font-size: 12px; font-weight: 700; letter-spacing: -.2px; color: var(--text); }

.tbl   { width: 100%; border-collapse: collapse; }
.tbl th { padding: 7px 14px; text-align: left; font-size: 9px; font-weight: 700; color: var(--text-dim); letter-spacing: .6px; font-family: var(--font-mono); border-bottom: 1px solid var(--border); text-transform: uppercase; white-space: nowrap; }
.tbl td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.03); font-size: 12px; color: var(--text-sub); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: var(--panel); cursor: pointer; }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tbl-wrap table { min-width: 480px; }

.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 9px; margin-bottom: 10px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; margin-bottom: 10px; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 9px; margin-bottom: 10px; }
.kpi-card { padding: 14px 15px; animation: fadeUp .35s both; }

.progress-track { height: 4px; border-radius: 2px; background: var(--panel-2); }
.progress-fill  { height: 100%; border-radius: 2px; transition: width 1.2s cubic-bezier(.16,1,.3,1); }

.dot-live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; animation: pulseDot 2.2s ease-in-out infinite; flex-shrink: 0; }

.kanban     { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; height: 100%; align-items: flex-start; }
.k-col      { min-width: 220px; max-width: 220px; display: flex; flex-direction: column; flex-shrink: 0; }
.k-col-head { padding: 9px 12px; border-radius: 9px 9px 0 0; display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 1px solid var(--border); border-bottom: none; }
.k-col-body { background: rgba(255,255,255,.018); border: 1px solid var(--border); border-top: none; border-radius: 0 0 9px 9px; padding: 7px; display: flex; flex-direction: column; gap: 6px; min-height: 250px; }
.k-card     { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 11px; cursor: pointer; transition: border-color .15s; }
.k-card:active { border-color: rgba(249,115,22,.35); }

.bar-wrap  { display: flex; align-items: flex-end; gap: 5px; height: 140px; padding: 0 4px; }
.bar       { border-radius: 4px 4px 0 0; min-width: 14px; transition: opacity .2s; cursor: pointer; }
.bar:hover { opacity: .75; }
.bar-label { font-size: 9px; font-family: var(--font-mono); color: var(--text-dim); text-align: center; margin-top: 5px; }

.chk-card              { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.chk-card.priority-hi  { border-left: 3px solid var(--red); }
.chk-card.priority-me  { border-left: 3px solid var(--accent); }
.chk-card.priority-lo  { border-left: 3px solid var(--green); }
.chk-item  { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.chk-item:last-child { border-bottom: none; }
.chk-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.chk-item label { font-size: 12.5px; color: var(--text-sub); cursor: pointer; flex: 1; transition: all .15s; }
.chk-item input:checked + label { text-decoration: line-through; color: var(--text-dim); }

.product-grid  { display: grid; grid-template-columns: repeat(auto-fill,minmax(230px,1fr)); gap: 14px; }
.product-card  { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: all .2s; }
.product-card:hover { border-color: rgba(249,115,22,.25); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.3); }
.product-thumb { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 42px; background: linear-gradient(135deg,var(--panel),var(--panel-2)); border-bottom: 1px solid var(--border); }
.product-body  { padding: 13px; }
.product-name  { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.product-desc  { font-size: 10.5px; color: var(--text-sub); font-family: var(--font-mono); line-height: 1.5; margin-bottom: 10px; }
.product-foot  { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-size: 16px; font-weight: 800; color: var(--text); }

.info-btn { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--panel); color: var(--text-dim); font-size: 10px; font-family: var(--font-mono); font-weight: 700; cursor: pointer; transition: all .15s; vertical-align: middle; margin-left: 6px; }
.info-btn:hover, .info-btn.active { background: var(--accent-d); color: var(--accent); border: 1px solid rgba(249,115,22,.3); }
.info-panel { display: none; margin: 0 0 12px; padding: 12px 14px; border-radius: 10px; background: var(--accent-d); border: 1px solid rgba(249,115,22,.14); border-left: 3px solid rgba(249,115,22,.5); }
.info-panel.open { display: block; }
.info-panel p { font-size: 11.5px; line-height: 1.65; color: var(--text-sub); font-family: var(--font-mono); }
.info-panel strong { color: var(--text-dim); font-size: 9px; text-transform: uppercase; letter-spacing: .3px; }

.cfg-block { background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); line-height: 1.8; }
.cfg-key { color: #818cf8; }
.cfg-val { color: var(--green); }
.cfg-cmt { color: var(--text-dim); }
.env-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 99px; background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2); font-size: 10px; color: #818cf8; font-family: var(--font-mono); font-weight: 700; }
.env-badge.local  { background: var(--green-d); border-color: rgba(34,197,94,.2); color: var(--green); }
.env-badge.hybrid { background: var(--accent-d); border-color: rgba(249,115,22,.2); color: var(--accent); }

/* ═══════════════════════════════════════════
   5. MODALS
═══════════════════════════════════════════ */
#modal-root {
  position: fixed; inset: 0; z-index: 1500;
  background: rgba(5,4,15,.92); backdrop-filter: blur(32px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#modal-root.open { display: flex; }
.modal-wrap    { width: 100%; max-width: 780px; max-height: 90vh; display: flex; flex-direction: column; }
.modal-card    { background: var(--panel); border: 1px solid var(--border-hi); border-radius: 18px; overflow: hidden; flex: 1; display: flex; flex-direction: column; position: relative; }
.modal-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg,transparent,rgba(139,92,246,.5),transparent); pointer-events: none; }
.modal-header  { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-title   { font-size: 13px; font-weight: 700; color: var(--text); }
.modal-close   { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; transition: color .15s; }
.modal-close:hover { color: var(--text); }
.modal-body    { flex: 1; overflow-y: auto; padding: 20px; }

.import-drop { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; border: 2px dashed var(--border-hi); margin: 20px; border-radius: 14px; cursor: pointer; transition: all .2s; text-align: center; }
.import-drop:hover, .import-drop.drag-over { border-color: rgba(167,139,250,.4); background: var(--purple-d); }
.import-drop input { display: none; }
.import-processing { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; text-align: center; gap: 16px; }
.spinner { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(167,139,250,.15); border-top-color: var(--purple); animation: spin 1s linear infinite; }

#onboard-overlay { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; background: rgba(5,4,15,.97); backdrop-filter: blur(40px); }
#onboard-overlay.open { display: flex; animation: fadeIn .3s ease; }
.ob-wrap      { width: 100%; max-width: 460px; padding: 0 20px; }
.ob-logo      { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.ob-logo-mark { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg,#ff8c3a,#f97316,#ea580c); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(249,115,22,.5); }
.ob-steps { display: flex; gap: 5px; margin-bottom: 28px; }
.ob-step  { flex: 1; height: 2px; border-radius: 2px; background: var(--border); transition: background .4s; }
.ob-step.done   { background: var(--accent); }
.ob-step.active { background: rgba(249,115,22,.4); }
.ob-card { background: var(--panel); border: 1px solid var(--border-hi); border-radius: 18px; padding: 28px; backdrop-filter: blur(20px); position: relative; overflow: hidden; }
.ob-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg,transparent,rgba(249,115,22,.4),transparent); }
.ob-bundles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.ob-bundle  { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel); cursor: pointer; transition: all .15s; text-align: left; }
.ob-bundle:hover     { border-color: rgba(249,115,22,.3); background: var(--accent-b); }
.ob-bundle.selected  { border-color: rgba(249,115,22,.45); background: var(--accent-d); }
.ob-bundle.selected .ob-bundle-name { color: var(--accent); }
.ob-bundle-icon { font-size: 22px; margin-bottom: 7px; }
.ob-bundle-name { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.ob-bundle-desc { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }

/* Insights banner */
.insights-banner  { padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; background: var(--accent-d); border: 1px solid rgba(249,115,22,.2); border-left: 3px solid var(--accent); display: flex; flex-direction: column; gap: 6px; }
.insights-header  { display: flex; align-items: center; gap: 8px; }
.insights-icon    { font-size: 14px; }
.insights-title   { font-size: 11px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); letter-spacing: .3px; text-transform: uppercase; }
.insight-item     { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-sub); font-family: var(--font-mono); }
.insight-dot      { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* ═══════════════════════════════════════════
   6. COMMAND PALETTE
═══════════════════════════════════════════ */
#command-palette {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(3,2,12,.88); backdrop-filter: blur(32px);
  display: none; align-items: flex-start; justify-content: center; padding-top: 12vh;
}
#command-palette.open { display: flex; animation: fadeIn .12s ease; }
.cmd-box { width: 100%; max-width: 560px; background: rgba(10,8,25,.98); border: 1px solid var(--border-hi); border-radius: 16px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(249,115,22,.08); animation: slideUp .15s ease; }
.cmd-box::before { content: ''; display: block; height: 1px; background: linear-gradient(90deg,transparent 5%,rgba(249,115,22,.4) 50%,transparent 95%); }
.cmd-input-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.cmd-slash     { width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--accent-d); border: 1px solid rgba(249,115,22,.2); font-size: 12px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
#cmd-input     { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: var(--font-sans); font-weight: 500; }
#cmd-input::placeholder { color: var(--text-dim); }
.cmd-esc       { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); padding: 2px 6px; border-radius: 4px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; flex-shrink: 0; }
#cmd-results   { max-height: 340px; overflow-y: auto; padding: 6px; }
.cmd-section-label { font-size: 9px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-mono); padding: 8px 10px 4px; display: block; }
.cmd-item      { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all .1s; border: 1px solid transparent; }
.cmd-item:hover, .cmd-item.selected { background: var(--accent-d); border-color: rgba(249,115,22,.15); }
.cmd-item-icon { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; background: var(--panel); border: 1px solid var(--border); }
.cmd-item-name { font-size: 12.5px; font-weight: 600; color: var(--text-sub); flex: 1; }
.cmd-item-meta { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
.cmd-empty     { padding: 28px; text-align: center; color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); }
.cmd-footer    { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--panel); }
.cmd-key       { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); }
.cmd-key kbd   { padding: 1px 5px; border-radius: 3px; background: var(--panel-2); border: 1px solid var(--border-hi); font-family: var(--font-mono); font-size: 9px; }

/* ═══════════════════════════════════════════
   7. TOAST NOTIFICATIONS
═══════════════════════════════════════════ */
#toast-root {
  position: fixed; bottom: calc(var(--status-h) + 12px); right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
  align-items: flex-end; pointer-events: none;
}
.toast {
  padding: 10px 16px; border-radius: 9px; pointer-events: all;
  max-width: 280px; animation: fadeUp .2s ease; cursor: pointer;
  line-height: 1.4; font-family: var(--font-mono); font-size: 11px;
  backdrop-filter: blur(20px); box-shadow: 0 4px 20px rgba(0,0,0,.2);
}

/* ═══════════════════════════════════════════
   8. ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fadeIn   { from{opacity:0}                            to{opacity:1} }
@keyframes fadeOut  { from{opacity:1}                            to{opacity:0} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:none} }
@keyframes slideUp  { from{transform:translateY(-8px);opacity:.6} to{transform:none;opacity:1} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(1.25)} }
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }

/* ═══════════════════════════════════════════
   9. RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  #sidebar, #flyout, #mc-strip { display: none !important; }
  .mob-nav  { display: flex !important; }
  #topbar   { padding-left: 16px; }
  #layout   { left: 0; }
  #view     { padding-top: 0; padding-bottom: 72px; }
  #statusbar { display: none; }
  #toast-root { bottom: 72px; }
  .grid-4, .grid-3 { grid-template-columns: 1fr 1fr !important; }
  .two-col, .dash-grid, .hub-grid { grid-template-columns: 1fr !important; }
  .product-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 520px) {
  .grid-4, .grid-3 { grid-template-columns: 1fr 1fr !important; gap: 7px !important; }
  .tbl-wrap table   { min-width: 480px; }
  #view-inner       { padding: 10px; padding-bottom: 80px; }
  .product-grid     { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<!-- Background mesh -->
<div id="os-bg"></div>

<!-- ═══════════════════════════════════════════
     HEADER (topbar)
═══════════════════════════════════════════ -->
<header id="topbar">
  <div class="topbar-left">
    <div id="page-title">Dashboard</div>
    <div id="breadcrumb">
      <span id="bc-cat">Finance</span>
      <span style="color:rgba(255,255,255,.15)">›</span>
      <span id="bc-item" class="bc-active">Dashboard</span>
    </div>
  </div>
  <div class="topbar-right">
    <div id="ws-mode-chip" onclick="toggleWorkspaceMode()" title="Toggle workspace mode"><span>CMD</span></div>
    <button class="btn-ghost" onclick="openCmd()" style="padding:4px 10px;font-family:var(--font-mono)" title="Command Palette (Ctrl+K)">
      <span style="font-size:11px;color:var(--text-dim)">⌕</span>
      <span style="font-size:9.5px;color:var(--text-dim)">Search</span>
      <kbd style="font-size:9px;padding:1px 4px;border-radius:3px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-mono)">^K</kbd>
    </button>
    <div style="position:relative">
      <button class="curr-btn" id="curr-btn" onclick="toggleCurrencyDropdown()">
        <span id="curr-flag">🇿🇦</span>
        <span id="curr-name">ZAR</span>
      </button>
      <div id="curr-dropdown" style="position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-2);border:1px solid var(--border-hi);border-radius:10px;overflow:hidden;z-index:500;min-width:130px;box-shadow:var(--shadow-lg);display:none"></div>
    </div>
    <div class="online-badge">
      <span class="dot-live" style="background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.6)"></span>
      <span>Online</span>
    </div>
    <button id="theme-toggle" class="sidebar-icon-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <div class="user-chip">
      <div class="chip-dot" id="chip-dot-initial">B</div>
      <span class="user-label" id="topbar-user-name">Brandon</span>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     LAYOUT (sidebar + main view)
═══════════════════════════════════════════ -->
<div id="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-brand" onclick="brandClick()" title="CoLAB OS">
      <div class="brand-mark"><span>C</span></div>
    </div>
    <div id="sidebar-ws-toggle">
      <button class="ws-btn" id="ws-btn-fx"  onclick="setWorkspaceMode('focus')"   title="Focus mode">Fx</button>
      <button class="ws-btn" id="ws-btn-cmd" onclick="setWorkspaceMode('command')" title="Command mode">Cmd</button>
    </div>
    <div id="sidebar-cats"><!-- rendered by app.js --></div>
    <div id="sidebar-foot">
      <button class="sidebar-icon-btn" onclick="openCmd()" title="Command Palette (Ctrl+K)" style="background:var(--accent-d);border-color:rgba(249,115,22,.2)">
        <span style="font-size:11px;color:var(--accent);font-family:var(--font-mono);font-weight:700">/</span>
      </button>
      <div class="sidebar-icon-btn" id="user-avatar" title="Account">
        <span id="user-initial" style="font-size:11px;font-weight:700;color:var(--purple)">B</span>
      </div>
    </div>
  </aside>

  <!-- FLYOUT NAV -->
  <div id="flyout" onmouseenter="clearFlyTimer()" onmouseleave="startFlyTimer()">
    <div id="flyout-head">
      <div id="flyout-cat-label">Finance</div>
      <div id="flyout-cat-desc">Wallet, invoices & expenses</div>
    </div>
    <div id="flyout-nav"><!-- rendered by app.js --></div>
    <div id="flyout-foot">
      <div class="tier-pill">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span id="flyout-tier-label">E-Commerce</span>
      </div>
    </div>
  </div>

  <!-- MISSION CONTROL STRIP -->
  <div id="mc-strip"><!-- rendered by app.js --></div>

  <!-- MAIN VIEW — all page modules render into #view-inner -->
  <main id="view">
    <div id="view-inner"></div>
  </main>

</div><!-- #layout -->

<!-- ═══════════════════════════════════════════
     FOOTER (statusbar)
═══════════════════════════════════════════ -->
<footer id="statusbar">
  <div class="status-item">
    <span class="dot-live" style="background:var(--green);box-shadow:0 0 5px rgba(74,222,128,.5)"></span>
    <span id="status-mode">LOCAL MODE</span>
  </div>
  <div class="status-sep"></div>

<!-- Modal root — import, confirmations, previews -->
<div id="modal-root">
  <div class="modal-wrap">
    <div class="modal-card" id="modal-card-body"></div>
  </div>
</div>

<!-- Command palette -->
<div id="command-palette">
  <div class="cmd-box">
    <div class="cmd-input-row">
      <div class="cmd-slash">/</div>
      <input id="cmd-input"
             placeholder="Navigate, create, or run any action…"
             oninput="cmdSearch(this.value)"
             onkeydown="cmdKeyNav(event)"
             autocomplete="off"/>
      <span class="cmd-esc" onclick="closeCmd()">Esc</span>
    </div>
    <div id="cmd-results"></div>
    <div class="cmd-footer">
      <span class="cmd-key"><kbd>↑↓</kbd> navigate</span>
      <span class="cmd-key"><kbd>↵</kbd> select</span>
      <span class="cmd-key"><kbd>Esc</kbd> close</span>
    </div>
  </div>
</div>

<!-- Onboarding overlay -->
<div id="onboard-overlay">
  <div class="ob-wrap" id="ob-content"><!-- rendered by app.js --></div>
</div>

<!-- Toast root -->
<div id="toast-root"></div>
